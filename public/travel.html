<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{{title}}</title>
    <link rel="stylesheet" href="/css/style.css" type="text/css" />
  </head>
  <body>
    <div id="background">
      <div id="page">
        <!-- HEADER -->
        <div id="header">
          <div id="logo">
            <a href="/"
              ><img src="/images/logo.png" alt="LOGO" height="100" width="200"
            /></a>
          </div>

          <div id="navigation">
            <ul>
              <li><a href="/">Home</a></li>
              <li class="selected"><a href="/travel">Travel</a></li>
              <li><a href="/rooms">Rooms</a></li>
              <li><a href="/meals">Meals</a></li>
              <li><a href="/news">News</a></li>
              <li><a href="/about">About</a></li>
              <li><a href="/contact">Contact</a></li>
            </ul>
          </div>
        </div>

        <!-- CONTENT -->
        <div id="contents">
          <div class="box">
            <div>
              <div class="body">
                <h1>{{title}}</h1>

                <ul id="sites">
                  {{#each trips}}
                  <li>
                    <a href="/travel">
                      <img src="/images/{{this.image}}" alt="{{this.name}}" />
                    </a>

                    <h2>
                      <a href="/travel">{{this.name}}</a>
                    </h2>

                    <p>{{this.description}}</p>
                  </li>
                  {{/each}}
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <div id="footer">
        <div>
          <ul class="navigation">
            <li><a href="/">Home</a></li>
            <li class="active"><a href="/travel">Travel</a></li>
            <li><a href="/rooms">Rooms</a></li>
            <li><a href="/meals">Meals</a></li>
            <li><a href="/news">News</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
          </ul>

          <div id="connect">
            <a href="#" class="pinterest"></a>
            <a href="#" class="facebook"></a>
            <a href="#" class="twitter"></a>
            <a href="#" class="googleplus"></a>
          </div>
        </div>

        <p>© 2023 by BHACCASYONIZTAS BEACH RESORT. All Rights Reserved</p>
      </div>
    </div>
  </body>
</html>
